modLoader="javafml" #mandatory
loaderVersion="${loader_version_range}" #mandatory
license="${mod_license}"
[[mods]] #mandatory
modId="${mod_id}" #mandatory
version="${mod_version}" #mandatory
displayName="${mod_name}" #mandatory
logoFile="icon.png"
description='''
A lightweight addon that lets you throw, launch, or mount-fire rope connectors for easier Create Aeronautics docking.
'''
[[dependencies.${mod_id}]] #optional
    modId="neoforge" #mandatory
    type="required" #mandatory
    versionRange="[${neo_version},)" #mandatory
    ordering="NONE"
    side="BOTH"
[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
[[dependencies.${mod_id}]]
    modId="create"
    type="required"
    versionRange="[6.0.10,)"
    ordering="AFTER"
    side="BOTH"
[[dependencies.${mod_id}]]
    modId="aeronautics_bundled"
    type="required"
    versionRange="[1.3.0,)"
    ordering="AFTER"
    side="BOTH"
[[dependencies.${mod_id}]]
    modId="simulated"
    type="optional"
    versionRange="[1.3.0,)"
    ordering="AFTER"
    side="BOTH"
